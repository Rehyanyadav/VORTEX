<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex | Premium 3D URL Engine</title>
    <meta name="description" content="Secure, fast, and visually stunning URL shortening experience.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div id="qr-modal" class="qr-modal">
        <div class="qr-content">
            <span class="close-modal" id="close-qr">&times;</span>
            <h2>Link QR Code</h2>
            <div id="qr-canvas-container"></div>
            <p>Scan to warp to destination</p>
            <button class="price-btn" id="download-qr">Download QR</button>
        </div>
    </div>

    <div id="redirect-overlay" class="redirect-overlay">
        <div class="vortex-spinner"></div>
        <h2>Vortexing you to destination...</h2>
        <p>Hang tight, we're warping space-time.</p>
    </div>

    <div class="container" id="main-container">
        <header>
            <h1>Vortex</h1>
            <p class="subtitle">Secure. Fast. Immersive.</p>
        </header>

        <div class="security-dashboard">
            <div class="health-meter">
                <div class="meter-ring"></div>
                <div class="health-status">
                    <span class="status-label">Security Health</span>
                    <span class="status-value">OPTIMAL</span>
                </div>
            </div>
            <div class="security-stats">
                <div class="stat-item">
                    <span class="stat-icon">🛡️</span>
                    <span class="stat-text">Encryption Active</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">🕵️</span>
                    <span class="stat-text">Bot Protection On</span>
                </div>
            </div>
        </div>

        <section class="input-section">
            <div class="input-group">
                <input type="text" id="url-input" placeholder="Warp your long URL here...">
                <button id="shorten-btn">
                    <span class="btn-text">Shorten</span>
                    <div class="loader" id="btn-loader"></div>
                </button>
            </div>
            <div class="advanced-options">
                <label for="expiry-select">Auto-Expire:</label>
                <select id="expiry-select">
                    <option value="0">Never</option>
                    <option value="60">1 Hour</option>
                    <option value="1440">24 Hours</option>
                    <option value="10080">7 Days</option>
                </select>
            </div>
        </section>

        <section class="links-list" id="links-list">
            <!-- Link cards will be injected here -->
        </section>

        <footer>
            <p>&copy; 2026 Vortex Engine. Built for the future.</p>
        </footer>
    </div>

    <div id="toast-container"></div>

    <script type="module" src="main.js"></script>
</body>
</html>
